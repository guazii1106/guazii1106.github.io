    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            background-color: #808080;
            color: white;
            text-align: center;
        }
        img {
            max-width: 100%;
            height: auto;
            margin-top: 20px;
        }
        h1 {
            margin-top: 20px;
        }
        p {
            font-size: 14px;
            margin-bottom: 20px;
        }
        .footer {
            font-size: 12px;
            margin-bottom: 10px;
        }
        .button-container {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            background-color: #87CEEB; /* 預設天空藍 */
            color: black;
            border: none;
            border-radius: 8px;
            padding: 0;
            width: 300px;
            height: 100px;
            text-decoration: none;
            font-size: 18px;
            margin: 10px 0;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .button-container:hover {
            border: 2px solid black;
        }
        .button-container img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px 0 0 8px;
        }
        .button-container span {
            flex: 1;
            text-align: left;
            padding: 0 15px;
            font-size: 18px;
        }
        .button-container::after {
            content: "👉";
            font-size: 20px;
            position: absolute;
            right: 10px;
            bottom: 10px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .button-container:hover::after {
            opacity: 1;
        }
        /* 按鈕背景色自訂 */
        .button1 { background-color: #e63946; } /* YouTube 紅色 */
        .button2 { background-color: #000000; color: white; } /* TikTok 黑色 */
        .button3 { background-color: #6a0dad; } /* DC群組 紫色 */
        .button4 { background-color: #c0c0c0; color: black; } /* ROBLOX 銀色 */
        .button5 { background-color: #ffffff; color: black; } /* 推特(X) 白色 */
        .button6 { background-color: #6441A5; } /* Twitch 深紫色 */
        .button7 { background-color: #87CEEB; } /* 哔哩哔哩 天空藍 */
    </style>
</head>
